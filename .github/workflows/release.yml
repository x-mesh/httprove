name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked

  build:
    needs: preflight
    name: build ${{ matrix.os_name }}_${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14,      target: aarch64-apple-darwin,       os_name: darwin, arch: arm64, cross: false }
          - { runner: macos-14,      target: x86_64-apple-darwin,        os_name: darwin, arch: amd64, cross: false }
          - { runner: ubuntu-latest, target: x86_64-unknown-linux-gnu,   os_name: linux,  arch: amd64, cross: true }
          - { runner: ubuntu-latest, target: aarch64-unknown-linux-gnu,  os_name: linux,  arch: arm64, cross: true }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }} --bin httprove

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }} --bin httprove

      - name: Package
        run: |
          set -eu
          # Cargo.toml의 [profile.release] strip = true 가 빌드 시 심볼을 제거하므로
          # 호스트 strip(크로스 시 아키텍처 불일치)을 따로 돌리지 않는다.
          name="httprove_${{ matrix.os_name }}_${{ matrix.arch }}.tar.gz"
          tar -czf "$name" -C "target/${{ matrix.target }}/release" httprove
          ( command -v sha256sum >/dev/null && sha256sum "$name" ) || shasum -a 256 "$name"
          mkdir -p pkg-smoke
          tar -xzf "$name" -C pkg-smoke
          test -x pkg-smoke/httprove
          test "$(tar -tzf "$name")" = "httprove"
          host="$(rustc -vV | sed -n 's/^host: //p')"
          if [ "${{ matrix.target }}" = "$host" ]; then
            ./pkg-smoke/httprove --version
            ./pkg-smoke/httprove --help >/dev/null
            ./pkg-smoke/httprove update --help >/dev/null
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: httprove_${{ matrix.os_name }}_${{ matrix.arch }}
          path: httprove_${{ matrix.os_name }}_${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -eu
          cd dist
          sha256sum *.tar.gz > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

  # 릴리스가 게시되면 x-mesh/homebrew-tap의 cask를 새 버전 + sha256으로 갱신한다.
  # HOMEBREW_TAP_GITHUB_TOKEN은 x-mesh org 레벨 시크릿 (gk/aic와 동일).
  cask:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: x-mesh/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: tap

      - name: Download checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${GITHUB_REF_NAME}" -R "${GITHUB_REPOSITORY}" -p checksums.txt -O checksums.txt

      - name: Render cask
        run: |
          set -eu
          version="${GITHUB_REF_NAME#v}"
          sum() { awk -v a="$1" '$2==a {print $1}' checksums.txt; }
          dr=$(sum httprove_darwin_arm64.tar.gz)
          da=$(sum httprove_darwin_amd64.tar.gz)
          lr=$(sum httprove_linux_arm64.tar.gz)
          la=$(sum httprove_linux_amd64.tar.gz)
          for s in "$dr" "$da" "$lr" "$la"; do
            [ -n "$s" ] || { echo "::error::missing checksum in checksums.txt"; exit 1; }
          done
          mkdir -p tap/Casks
          # unquoted heredoc: 셸이 ${version}/${dr} 등을 치환하고, 루비 보간 #{version}은
          # ($ 가 없어) 그대로 남는다.
          cat > tap/Casks/httprove.rb <<EOF
          # This file is generated by the httprove release workflow. DO NOT EDIT.
          cask "httprove" do
            version "${version}"

            on_macos do
              on_arm do
                sha256 "${dr}"
                url "https://github.com/x-mesh/httprove/releases/download/v#{version}/httprove_darwin_arm64.tar.gz"
              end
              on_intel do
                sha256 "${da}"
                url "https://github.com/x-mesh/httprove/releases/download/v#{version}/httprove_darwin_amd64.tar.gz"
              end
            end

            on_linux do
              on_arm do
                sha256 "${lr}"
                url "https://github.com/x-mesh/httprove/releases/download/v#{version}/httprove_linux_arm64.tar.gz"
              end
              on_intel do
                sha256 "${la}"
                url "https://github.com/x-mesh/httprove/releases/download/v#{version}/httprove_linux_amd64.tar.gz"
              end
            end

            name "httprove"
            desc "HTTP(S) service diagnostics for SREs: latency waterfall, TLS inspection, TUI"
            homepage "https://github.com/x-mesh/httprove"

            livecheck do
              skip "Auto-generated on release."
            end

            binary "httprove"
            # 단축 명령 hpr 를 같은 바이너리로 노출.
            binary "httprove", target: "hpr"

            postflight do
              system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/httprove"]
            end

            caveats <<~CAVEAT
              Two commands are installed: httprove (primary) and hpr (alias).
              Run 'httprove update' to self-update.
            CAVEAT
          end
          EOF
          echo "=== rendered cask ==="
          cat tap/Casks/httprove.rb

      - name: Commit & push
        run: |
          set -eu
          cd tap
          git config user.name "httprove-bot"
          git config user.email "bot@x-mesh.dev"
          git add Casks/httprove.rb
          if git diff --cached --quiet; then
            echo "cask already up to date"
          else
            git commit -m "Brew cask update for httprove version ${GITHUB_REF_NAME}"
            git push
          fi
